    .ascii-art{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text);line-height:1.5;white-space:pre;overflow-x:auto}

    .divider{width:100%;height:1px;background:var(--border);margin:28px 0}
    .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--accent);color:#000;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;padding:10px 22px;border-radius:100px;opacity:0;transition:transform 0.25s ease,opacity 0.25s ease;z-index:100;pointer-events:none}
    .toast.show{transform:translateX(-50%) translateY(0);opacity:1}
    footer{text-align:center;font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace}
    footer span{color:var(--accent)}
    .theme-toggle{position:fixed;top:16px;right:16px;z-index:999;background:var(--surface);border:1px solid var(--border);color:var(--text);width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;transition:all 0.2s;box-shadow:0 2px 8px rgba(0,0,0,0.2)}

<div class="wrapper">

    <h1>Arte <span>ASCII</span></h1>
    <p class="subtitle">// haz clic para copiar al instante</p>

</div>
<div class="toast" id="toast"></div>
<button class="theme-toggle" id="themeBtn" title="Cambiar tema">вҳҖпёҸ</button>

<script>
  const groups = [
    { title: 'Bordes y cajas', items: [
      { label: 'Caja doble', art: `в•”в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•—\nв•‘   TU TEXTO   в•‘\nв•ҡв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•қ` },
      { label: 'Caja simple', art: `в”Ңв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”җ\nв”Ӯ   tu texto   в”Ӯ\nв””в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”ҳ` },
      { label: 'Caja redondeada', art: `в•ӯв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв•®\nв”Ӯ   tu texto   в”Ӯ\nв•°в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв•Ҝ` },
      { label: 'Caja gruesa', art: `в–ӣв–Җв–Җв–Җв–Җв–Җв–Җв–Җв–Җв–Җв–Җв–Җв–Җв–Җв–Җв–ң\nв–Ң   tu texto   в–җ\nв–ҷв–„в–„в–„в–„в–„в–„в–„в–„в–„в–„в–„в–„в–„в–„в–ҹ` },
    ]},
    { title: 'Caras y emoticonos', items: [
      { label: 'Feliz', art: `( НЎВ° НңК– НЎВ°)` },
      { label: 'Shrug', art: `ВҜ\\_(гғ„)_/ВҜ` },
      { label: 'Tableflip', art: `(в•ҜВ°в–ЎВ°пјүв•Ҝпёө в”»в”Ғв”»` },
      { label: 'Poner mesa', art: `в”¬в”Җв”¬гғҺ( Вә _ ВәгғҺ)` },
      { label: 'Cara kawaii', art: `(гҒҘпҪЎв—•вҖҝвҖҝв—•пҪЎ)гҒҘ` },
      { label: 'Cara enojada', art: `(аІ _аІ )` },
      { label: 'Bailando', art: `б••( бҗӣ )б•—` },
      { label: 'Konosuba', art: `(в•№в—Ўв•№)` },
    ]},
    { title: 'Animales', items: [
      { label: 'Gato', art: `=^.^=` },
      { label: 'Oso', art: `К•вҖўбҙҘвҖўК”` },
      { label: 'Conejo', art: `(\\_/)\n( вҖў_вҖў)\n/ > рҹҘ•` },
      { label: 'Pulpo', art: `   ___\n  (o o)\n /|^^^|\\\n  |   |\n  |___|` },
    ]},
    { title: 'Separadores', items: [
      { label: 'LГӯnea simple', art: `в”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғв”Ғ` },
      { label: 'LГӯnea doble', art: `в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ` },
      { label: 'LГӯnea decorada', art: `В·.В·.В·.В·.В·.В·.В·.В·.В·.В·.В·.В·.В·` },
      { label: 'Estrellas', art: `вңҰ вңҰ вңҰ вңҰ вңҰ вңҰ вңҰ вңҰ вңҰ вңҰ вңҰ вңҰ` },
      { label: 'Diamantes', art: `в—Ү в—Ү в—Ү в—Ү в—Ү в—Ү в—Ү в—Ү в—Ү в—Ү в—Ү в—Ү` },
      { label: 'Corazones', art: `вҷҘ вҷҘ вҷҘ вҷҘ вҷҘ вҷҘ вҷҘ вҷҘ вҷҘ вҷҘ вҷҘ вҷҘ` },
    ]},
    { title: 'Objetos', items: [
      { label: 'CorazГіn ASCII', art: `  вҷҘвҷҘ   вҷҘвҷҘ\nвҷҘ    вҷҘ    вҷҘ\nвҷҘ         вҷҘ\n  вҷҘ     вҷҘ\n    вҷҘ вҷҘ\n      вҷҘ` },
      { label: 'Estrella ASCII', art: `    *\n   ***\n  *****\n *******\n*********\n *******\n  *****\n   ***\n    *` },
      { label: 'Casa', art: `    /\\\n   /  \\\n  / /\\ \\\n /______\\\n |  ||  |\n |  ||  |` },
      { label: 'Cohete', art: `   |\n  /|\\\n / | \\\n|  |  |\n|  *  |\n \\   /\n  \\_/\n  | |\n  |_|` },
    ]},
  ];

  const container = document.getElementById('asciiContainer');
  groups.forEach(g => {
    const label = document.createElement('p');
    label.className = 'section-label';
    label.textContent = g.title;
    container.appendChild(label);

    g.items.forEach(item => {
      const card = document.createElement('div');
      card.className = 'ascii-card';
      card.innerHTML = `
        <div style="flex:1;min-width:0">
          <div class="ascii-label">${item.label}</div>
          <div class="ascii-art">${item.art}</div>
        </div>
        <span class="copy-hint">Copiar</span>
      `;
      card.addEventListener('click', () => {
        navigator.clipboard.writeText(item.art).catch(()=>{});
        showToast('ВЎCopiado!');
      });
      container.appendChild(card);
    });
  });

  let t;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    clearTimeout(t); t = setTimeout(()=>el.classList.remove('show'),1800);
  }

  const btn = document.getElementById('themeBtn');
  const saved = localStorage.getItem('theme') || 'dark';
  if (saved === 'light') { document.body.classList.add('light'); btn.textContent = 'рҹҢҷ'; }
  btn.addEventListener('click', () => {
    const isLight = document.body.classList.toggle('light');
    localStorage.setItem('theme', isLight ? 'light' : 'dark');
    btn.textContent = isLight ? 'рҹҢҷ' : 'вҳҖпёҸ';
  });
</script>
</body>
