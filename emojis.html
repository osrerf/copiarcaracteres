  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#0a0a0a; --surface:#111; --border:#222; --accent:#e8ff47; --text:#f0f0f0; --muted:#555; --btn-bg:#161616; --btn-hover:#1e1e1e; --btn-border:#2a2a2a; }
    body { background:var(--bg); color:var(--text); font-family:'Syne',sans-serif; min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:48px 20px 60px; position:relative; overflow-x:hidden; }
    body::before { content:''; position:fixed; inset:0; background-image:linear-gradient(rgba(232,255,71,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(232,255,71,0.03) 1px,transparent 1px); background-size:40px 40px; pointer-events:none; z-index:0; }
    .wrapper { position:relative; z-index:1; width:100%; max-width:720px; }
    .back-link { display:inline-flex; align-items:center; gap:8px; font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); text-decoration:none; margin-bottom:32px; transition:color 0.15s; }
    .back-link:hover { color:var(--accent); }
    .back-link::before { content:'←'; font-size:14px; }
    header { text-align:center; margin-bottom:40px; }
    .logo { font-size:13px; font-weight:700; letter-spacing:0.3em; text-transform:uppercase; color:var(--accent); margin-bottom:10px; opacity:0; animation:fadeUp 0.5s ease forwards 0.1s; }
    h1 { font-size:clamp(2rem,6vw,3.2rem); font-weight:800; letter-spacing:-0.02em; line-height:1.1; opacity:0; animation:fadeUp 0.5s ease forwards 0.2s; }
    h1 span { color:var(--accent); }
    .subtitle { font-size:14px; color:var(--muted); margin-top:10px; font-family:'JetBrains Mono',monospace; opacity:0; animation:fadeUp 0.5s ease forwards 0.3s; }
    .chars-section { opacity:0; animation:fadeUp 0.5s ease forwards 0.4s; }
    .char-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:8px; margin-bottom:20px; }
    .char-btn { background:var(--btn-bg); border:1px solid var(--btn-border); color:var(--text); cursor:pointer; border-radius:4px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; position:relative; overflow:hidden; transition:border-color 0.15s,background 0.15s,transform 0.1s; user-select:none; padding:12px 6px 8px; }
    .char-btn::after { content:''; position:absolute; inset:0; background:var(--accent); opacity:0; transition:opacity 0.2s; }
    .char-btn:hover { border-color:var(--accent); background:var(--btn-hover); transform:translateY(-2px); }
    .char-btn:active { transform:translateY(0); }
    .char-btn.copied::after { opacity:0.08; }
    .char-symbol { font-size:26px; line-height:1; }
    .char-name { font-size:8px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); font-family:'JetBrains Mono',monospace; }
    .divider { width:100%; height:1px; background:var(--border); margin:28px 0; }
    .toast { position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--accent); color:#000; font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; padding:10px 22px; border-radius:100px; opacity:0; transition:transform 0.25s ease,opacity 0.25s ease; z-index:100; pointer-events:none; }
    .toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
    footer { text-align:center; font-size:11px; color:var(--muted); font-family:'JetBrains Mono',monospace; }
    footer span { color:var(--accent); }
    .group-title { font-size:11px; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); margin:20px 0 8px; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  
    /* ===== LIGHT THEME ===== */
    body.light {
      --bg: #f5f5f0;
      --surface: #ffffff;
      --border: #d0d0d0;
      --accent: #4a8000;
      --text: #111111;
      --muted: #555;
      --btn-bg: #ffffff;
      --btn-hover: #efefef;
      --btn-border: #ccc;
    }
    body.light .msg-text,
    body.light .estilo-text,
    body.light .font-text,
    body.light .nick-text,
    body.light .char-symbol,
    body.light .frase-texto-fancy,
    body.light p,
    body.light .frase-autor,
    body.light .char-name,
    body.light .estilo-label,
    body.light .nick-label,
    body.light .font-label {
      color: #111111 !important;
    }
    body.light .section-label,
    body.light .group-title,
    body.light .subtitle,
    body.light .copy-hint,
    body.light .msg-copy {
      color: #444444 !important;
    }
    body.light::before {
      background-image:
        linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.04) 1px, transparent 1px);
    }

    /* Theme toggle button */
    .theme-toggle {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 999;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .theme-toggle:hover {
      border-color: var(--accent);
      transform: scale(1.1);
    }

<div class="wrapper">
  <a href="/" class="back-link">Inicio</a>
  <header>
    <div class="logo">✦ CopiarCaracteres</div>
    <h1>Emojis para <span>Copiar</span></h1>
    <p class="subtitle">// haz clic para copiar al instante</p>
  </header>

  <div class="chars-section" id="allGroups"></div>

  <div class="divider"></div>
  <footer><span>CopiarCaracteres</span> · <a href="/" style="color:var(--muted);text-decoration:none">Inicio</a> · <a href="privacidad.html" style="color:var(--muted);text-decoration:none">Privacidad</a></footer>
</div>
<div class="toast" id="toast"></div>
<script>
  const groups = [
    { title: 'Caritas', chars: [['😀','Feliz'],['😂','Carcajada'],['😍','Enamorado'],['😎','Cool'],['😢','Triste'],['😡','Enojado'],['😱','Asustado'],['😴','Dormido'],['🤔','Pensando'],['😏','Pícaro'],['🥺','Suplica'],['😤','Orgulloso']] },
    { title: 'Gestos', chars: [['👍','Ok'],['👎','No'],['👏','Aplausos'],['🙌','Celebrar'],['🤝','Acuerdo'],['👊','Puño'],['✌️','Paz'],['🤞','Suerte'],['👋','Hola'],['🙏','Gracias'],['💪','Fuerza'],['🫶','Amor']] },
    { title: 'Corazones', chars: [['❤️','Rojo'],['🧡','Naranja'],['💛','Amarillo'],['💚','Verde'],['💙','Azul'],['💜','Morado'],['🖤','Negro'],['🤍','Blanco'],['💕','Dos'],['💞','Giro'],['💗','Crece'],['💔','Roto']] },
    { title: 'Naturaleza', chars: [['🌟','Estrella'],['⭐','Star'],['🌙','Luna'],['☀️','Sol'],['🌈','Arcoíris'],['⚡','Rayo'],['🔥','Fuego'],['❄️','Hielo'],['🌊','Ola'],['🌸','Flor'],['🌺','Hibisco'],['🍀','Trébol']] },
    { title: 'Animales', chars: [['🐶','Perro'],['🐱','Gato'],['🐻','Oso'],['🦁','León'],['🐸','Rana'],['🐧','Pingüino'],['🦊','Zorro'],['🐺','Lobo'],['🦋','Mariposa'],['🐝','Abeja'],['🦄','Unicornio'],['🐉','Dragón']] },
    { title: 'Objetos', chars: [['💎','Diamante'],['👑','Corona'],['🎮','Juego'],['🎵','Nota'],['📱','Celular'],['💻','PC'],['🎯','Diana'],['🏆','Trofeo'],['💰','Dinero'],['🎁','Regalo'],['🔑','Llave'],['⚔️','Espada']] },
  ];

  const container = document.getElementById('allGroups');
  groups.forEach(g => {
    const title = document.createElement('p');
    title.className = 'group-title';
    title.textContent = g.title;
    container.appendChild(title);

    const grid = document.createElement('div');
    grid.className = 'char-grid';
    g.chars.forEach(([sym, name]) => {
      const btn = document.createElement('button');
      btn.className = 'char-btn';
      btn.innerHTML = `<span class="char-symbol">${sym}</span><span class="char-name">${name}</span>`;
      btn.addEventListener('click', () => {
        navigator.clipboard.writeText(sym).catch(()=>{});
        btn.classList.add('copied');
        setTimeout(()=>btn.classList.remove('copied'),300);
        showToast(`${sym} copiado`);
      });
      grid.appendChild(btn);
    });
    container.appendChild(grid);
  });

  let t;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    clearTimeout(t); t = setTimeout(()=>el.classList.remove('show'),1800);
  }

  // Theme toggle
  (function() {
    const saved = localStorage.getItem('theme') || 'dark';
    if (saved === 'light') document.body.classList.add('light');
    const btn = document.createElement('button');
    btn.className = 'theme-toggle';
    btn.title = 'Cambiar tema';
    btn.textContent = saved === 'light' ? '🌙' : '☀️';
    btn.addEventListener('click', () => {
      const isLight = document.body.classList.toggle('light');
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
      btn.textContent = isLight ? '🌙' : '☀️';
    });
    document.body.appendChild(btn);
  })();
</script>
