  <div class="input-section">
    <p class="section-label">Tu nombre</p>
    <div class="input-row">
      <input type="text" id="nameInput" placeholder="Ej: Oscar, Dragon, Killer..." maxlength="20"/>
      <button class="gen-btn" onclick="generateNicks()">Generar ⚡</button>

<script>
  // Leetspeak map
  const leet = { a:'4',e:'3',i:'1',o:'0',s:'5',t:'7',l:'1',b:'8',g:'9' };
  function toLeet(str) {
    return str.split('').map(c => leet[c.toLowerCase()] || c).join('');
  }

  // Fancy unicode letters — lookup tables
  const boldMap   = {'A':'𝐀','B':'𝐁','C':'𝐂','D':'𝐃','E':'𝐄','F':'𝐅','G':'𝐆','H':'𝐇','I':'𝐈','J':'𝐉','K':'𝐊','L':'𝐋','M':'𝐌','N':'𝐍','O':'𝐎','P':'𝐏','Q':'𝐐','R':'𝐑','S':'𝐒','T':'𝐓','U':'𝐔','V':'𝐕','W':'𝐖','X':'𝐗','Y':'𝐘','Z':'𝐙','a':'𝐚','b':'𝐛','c':'𝐜','d':'𝐝','e':'𝐞','f':'𝐟','g':'𝐠','h':'𝐡','i':'𝐢','j':'𝐣','k':'𝐤','l':'𝐥','m':'𝐦','n':'𝐧','o':'𝐨','p':'𝐩','q':'𝐪','r':'𝐫','s':'𝐬','t':'𝐭','u':'𝐮','v':'𝐯','w':'𝐰','x':'𝐱','y':'𝐲','z':'𝐳'};
  const scriptMap = {'A':'𝓐','B':'𝓑','C':'𝓒','D':'𝓓','E':'𝓔','F':'𝓕','G':'𝓖','H':'𝓗','I':'𝓘','J':'𝓙','K':'𝓚','L':'𝓛','M':'𝓜','N':'𝓝','O':'𝓞','P':'𝓟','Q':'𝓠','R':'𝓡','S':'𝓢','T':'𝓣','U':'𝓤','V':'𝓥','W':'𝓦','X':'𝓧','Y':'𝓨','Z':'𝓩','a':'𝓪','b':'𝓫','c':'𝓬','d':'𝓭','e':'𝓮','f':'𝓯','g':'𝓰','h':'𝓱','i':'𝓲','j':'𝓳','k':'𝓴','l':'𝓵','m':'𝓶','n':'𝓷','o':'𝓸','p':'𝓹','q':'𝓺','r':'𝓻','s':'𝓼','t':'𝓽','u':'𝓾','v':'𝓿','w':'𝔀','x':'𝔁','y':'𝔂','z':'𝔃'};

  function toFancy(str, map) {
    return str.split('').map(c => map[c] || c).join('');
  }

  function generateNicks() {
    const raw = document.getElementById('nameInput').value.trim();
    if (!raw) { showToast('Escribe tu nombre primero'); return; }

    const name  = raw;
    const upper = raw.toUpperCase();
    const lower = raw.toLowerCase();
    const leet1 = toLeet(raw);
    const leet2 = toLeet(upper);

    const nicks = [
      { label: 'Clásico xX',         nick: `xX_${upper}_Xx` },
      { label: 'Elite',               nick: `xX__${leet2}__Xx` },
      { label: 'Fuego',               nick: `꧁🔥${upper}🔥꧂` },
      { label: 'Corona',              nick: `꧁༒☬${upper}☬༒꧂` },
      { label: 'Diamante',            nick: `◈${upper}◈` },
      { label: 'Calavera',            nick: `☠${upper}☠` },
      { label: 'Estrellas',           nick: `★彡${name}彡★` },
      { label: 'Pro Gamer',           nick: `•${upper}• PRO` },
      { label: 'Bold',                nick: toFancy(name, boldMap) },
      { label: 'Script',              nick: toFancy(name, scriptMap) },
      { label: 'Clan Style',          nick: `[${upper}]` },
      { label: 'Demon',               nick: `ꀸ${upper}ꀸ` },
      { label: 'Dark',                nick: `彡${leet2}彡` },
      { label: 'Llamas',              nick: `『${upper}』` },
      { label: 'Militar',             nick: `|${upper}|` },
      { label: 'Sniper',              nick: `†${upper}†` },
      { label: 'Cool dots',           nick: `·.·${name}·.·` },
      { label: 'Free Fire Style',     nick: `꧁꧂${upper}꧁꧂` },
      { label: 'Legendario',          nick: `⚡${upper}⚡` },
      { label: 'Ultimate',            nick: `【${upper}】` },
    ];

    const grid = document.getElementById('nickGrid');
    const label = document.getElementById('resultsLabel');
    grid.innerHTML = '';
    label.style.display = 'block';

    nicks.forEach(({label: lbl, nick}) => {
      const card = document.createElement('div');
      card.className = 'nick-card';
      card.innerHTML = `
        <div>
          <div class="nick-label">${lbl}</div>
          <div class="nick-text">${nick}</div>
        </div>
        <span class="copy-hint">Copiar</span>
      `;
      card.addEventListener('click', () => {
        navigator.clipboard.writeText(nick).catch(()=>{});
        showToast('¡Nick copiado!');
      });
      grid.appendChild(card);
    });
  }

  // Generate on Enter key
  document.getElementById('nameInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') generateNicks();
  });

  let t;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    clearTimeout(t); t = setTimeout(()=>el.classList.remove('show'),1800);
  }

  // Theme toggle
  (function() {
    const saved = localStorage.getItem('theme') || 'dark';
    if (saved === 'light') document.body.classList.add('light');
    const btn = document.createElement('button');
    btn.className = 'theme-toggle';
    btn.title = 'Cambiar tema';
    btn.textContent = saved === 'light' ? '🌙' : '☀️';
    btn.addEventListener('click', () => {
      const isLight = document.body.classList.toggle('light');
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
      btn.textContent = isLight ? '🌙' : '☀️';
    });
    document.body.appendChild(btn);
  })();
</script>
