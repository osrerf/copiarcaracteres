  <div id="tabMes">

<script>
  const frasesMes = [
    { texto:"Un nuevo año comienza. Tus sueños no tienen fecha de vencimiento.", autor:"Anónimo", emoji:"🎆" },
    { texto:"El amor no se busca, se construye cada día con paciencia y dedicación.", autor:"Anónimo", emoji:"❤️" },
    { texto:"La primavera llega para recordarnos que después de cada invierno hay renovación.", autor:"Anónimo", emoji:"🌸" },
    { texto:"No esperes el momento perfecto. Toma el momento y hazlo perfecto.", autor:"Anónimo", emoji:"⚡" },
    { texto:"La vida florece cuando decides regar tus sueños con acción.", autor:"Anónimo", emoji:"🌻" },
    { texto:"El sol sale cada mañana para recordarte que siempre hay una nueva oportunidad.", autor:"Anónimo", emoji:"☀️" },
    { texto:"El verano no dura para siempre, disfruta cada momento como si fuera único.", autor:"Anónimo", emoji:"🌊" },
    { texto:"La perseverancia es la madre del éxito. Nunca pares de intentarlo.", autor:"Anónimo", emoji:"🔥" },
    { texto:"Como el otoño renueva los árboles, deja ir lo que ya no te sirve.", autor:"Anónimo", emoji:"🍂" },
    { texto:"El cambio no es el fin del camino, es solo una curva en el viaje.", autor:"Anónimo", emoji:"🛤️" },
    { texto:"La gratitud convierte lo ordinario en extraordinario.", autor:"Anónimo", emoji:"🙏" },
    { texto:"El año termina, pero lo mejor de ti continúa. Celebra lo que fuiste y sueña lo que serás.", autor:"Anónimo", emoji:"🎉" },
  ];

  const scriptBold = {A:'𝓐',B:'𝓑',C:'𝓒',D:'𝓓',E:'𝓔',F:'𝓕',G:'𝓖',H:'𝓗',I:'𝓘',J:'𝓙',K:'𝓚',L:'𝓛',M:'𝓜',N:'𝓝',O:'𝓞',P:'𝓟',Q:'𝓠',R:'𝓡',S:'𝓢',T:'𝓣',U:'𝓤',V:'𝓥',W:'𝓦',X:'𝓧',Y:'𝓨',Z:'𝓩',a:'𝓪',b:'𝓫',c:'𝓬',d:'𝓭',e:'𝓮',f:'𝓯',g:'𝓰',h:'𝓱',i:'𝓲',j:'𝓳',k:'𝓴',l:'𝓵',m:'𝓶',n:'𝓷',o:'𝓸',p:'𝓹',q:'𝓺',r:'𝓻',s:'𝓼',t:'𝓽',u:'𝓾',v:'𝓿',w:'𝔀',x:'𝔁',y:'𝔂',z:'𝔃'};
  const bold = {A:'𝐀',B:'𝐁',C:'𝐂',D:'𝐃',E:'𝐄',F:'𝐅',G:'𝐆',H:'𝐇',I:'𝐈',J:'𝐉',K:'𝐊',L:'𝐋',M:'𝐌',N:'𝐍',O:'𝐎',P:'𝐏',Q:'𝐐',R:'𝐑',S:'𝐒',T:'𝐓',U:'𝐔',V:'𝐕',W:'𝐖',X:'𝐗',Y:'𝐘',Z:'𝐙',a:'𝐚',b:'𝐛',c:'𝐜',d:'𝐝',e:'𝐞',f:'𝐟',g:'𝐠',h:'𝐡',i:'𝐢',j:'𝐣',k:'𝐤',l:'𝐥',m:'𝐦',n:'𝐧',o:'𝐨',p:'𝐩',q:'𝐪',r:'𝐫',s:'𝐬',t:'𝐭',u:'𝐮',v:'𝐯',w:'𝐰',x:'𝐱',y:'𝐲',z:'𝐳'};
  const italic = {A:'𝘈',B:'𝘉',C:'𝘊',D:'𝘋',E:'𝘌',F:'𝘍',G:'𝘎',H:'𝘏',I:'𝘐',J:'𝘑',K:'𝘒',L:'𝘓',M:'𝘔',N:'𝘕',O:'𝘖',P:'𝘗',Q:'𝘘',R:'𝘙',S:'𝘚',T:'𝘛',U:'𝘜',V:'𝘝',W:'𝘞',X:'𝘟',Y:'𝘠',Z:'𝘡',a:'𝘢',b:'𝘣',c:'𝘤',d:'𝘥',e:'𝘦',f:'𝘧',g:'𝘨',h:'𝘩',i:'𝘪',j:'𝘫',k:'𝘬',l:'𝘭',m:'𝘮',n:'𝘯',o:'𝘰',p:'𝘱',q:'𝘲',r:'𝘳',s:'𝘴',t:'𝘵',u:'𝘶',v:'𝘷',w:'𝘸',x:'𝘹',y:'𝘺',z:'𝘻'};

  function cv(text, map) { return [...text].map(c=>map[c]||c).join(''); }

  function buildEstilos(texto, autor, emoji) {
    const aut = autor ? `\n— ${autor}` : '';
    const autF = autor ? `\n— ${cv(autor,scriptBold)}` : '';
    return [
      { label:'✨ Cursiva elegante',   text:`${emoji} ${cv(texto,scriptBold)}${autF}` },
      { label:'💎 Negrita',            text:`${emoji} ${cv(texto,bold)}${aut}` },
      { label:'🖊️ Itálica',           text:`${emoji} ${cv(texto,italic)}${aut}` },
      { label:'🌟 Con estrellas',      text:`✨ ${texto} ✨${aut}` },
      { label:'🌸 Kawaii',            text:`꒰ ${emoji} ꒱\n${texto}${aut}` },
      { label:'👑 Estilo reina/rey',   text:`꧁👑 ${texto} 👑꧂${aut}` },
      { label:'💫 Minimalista',        text:`· ${texto} ·${aut}` },
      { label:'🔥 Con fuego',          text:`🔥 ${texto} 🔥${aut}` },
      { label:'💜 Con corazón',        text:`${texto} 💜${aut}` },
      { label:'📱 Para stories',       text:`${emoji}\n\n"${texto}"${aut}\n\n#frases #motivacion #instagram` },
      { label:'💬 Para WhatsApp',      text:`${emoji} _${texto}_${aut}` },
      { label:'🎀 Decorada',           text:`🎀 ${cv(texto,scriptBold)} 🎀${autF}` },
    ];
  }

  function renderEstilos(id, texto, autor, emoji) {
    const grid = document.getElementById(id);
    grid.innerHTML = '';
    buildEstilos(texto, autor, emoji).forEach(({label,text}) => {
      const card = document.createElement('div');
      card.className = 'estilo-card';
      card.innerHTML = `<div class="estilo-info"><div class="estilo-label">${label}</div><div class="estilo-text">${text.replace(/\n/g,'<br>')}</div></div><span class="copy-hint">Copiar</span>`;
      card.addEventListener('click', () => { navigator.clipboard.writeText(text).catch(()=>{}); showToast('¡Copiado!'); });
      grid.appendChild(card);
    });
  }

  let currentFrase = null;

  function loadMes() {
    const mes = new Date().getMonth();
    currentFrase = frasesMes[mes];
    document.getElementById('mainEmoji').textContent = currentFrase.emoji;
    document.getElementById('mainFrase').textContent = cv(currentFrase.texto, scriptBold);
    document.getElementById('mainAutor').textContent = `— ${currentFrase.autor}`;
    renderEstilos('estilosGridMes', currentFrase.texto, currentFrase.autor, currentFrase.emoji);
  }

  function copyMain() {
    const f = currentFrase;
    navigator.clipboard.writeText(`${f.emoji} ${cv(f.texto,scriptBold)}\n— ${cv(f.autor,scriptBold)}`).catch(()=>{});
    showToast('¡Frase copiada!');
  }

  function generateCustom() {
    const texto = document.getElementById('customFrase').value.trim();
    const autor = document.getElementById('customAutor').value.trim();
    if (!texto) { showToast('Escribe tu frase primero'); return; }
    renderEstilos('estilosGridCustom', texto, autor, '💫');
    document.getElementById('customResults').classList.remove('hidden');
  }

  function switchTab(tab) {
    const btns = document.querySelectorAll('.tab-btn');
    btns.forEach(b=>b.classList.remove('active'));
    if (tab === 'mes') {
      btns[0].classList.add('active');
      document.getElementById('tabMes').classList.remove('hidden');
      document.getElementById('tabCustom').classList.add('hidden');
    } else {
      btns[1].classList.add('active');
      document.getElementById('tabMes').classList.add('hidden');
      document.getElementById('tabCustom').classList.remove('hidden');
    }
  }

  const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  document.getElementById('monthText').textContent = meses[new Date().getMonth()] + ' ' + new Date().getFullYear();

  loadMes();

  let t;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    clearTimeout(t); t = setTimeout(()=>el.classList.remove('show'),1800);
  }

  // Theme toggle
  (function() {
    const saved = localStorage.getItem('theme') || 'dark';
    if (saved === 'light') document.body.classList.add('light');
    const btn = document.createElement('button');
    btn.className = 'theme-toggle';
    btn.title = 'Cambiar tema';
    btn.textContent = saved === 'light' ? '🌙' : '☀️';
    btn.addEventListener('click', () => {
      const isLight = document.body.classList.toggle('light');
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
      btn.textContent = isLight ? '🌙' : '☀️';
    });
    document.body.appendChild(btn);
  })();
</script>
