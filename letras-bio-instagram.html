  function convertMap(text, map) {
    const upArr = [...map.upper];
    const loArr = [...map.lower];
    const dgArr = map.digits ? [...map.digits] : null;
    return [...text].map(c => {
      const u = c.toUpperCase();
      const code = u.charCodeAt(0);
      if (code >= 65 && code <= 90) {
        const idx = code - 65;
        if (c === c.toUpperCase() && c !== c.toLowerCase()) return upArr[idx] || c;
        return loArr[idx] || c;
      }
      if (dgArr && c >= '0' && c <= '9') return [...dgArr][c.charCodeAt(0)-48] || c;
      return c;
    }).join('');
  }

  function convertSimple(text, upper, lower) {
    const upArr = [...upper];
    const loArr = [...lower];
    return [...text].map(c => {
      const code = c.charCodeAt(0);
      if (code >= 65 && code <= 90) return upArr[code-65] || c;
      if (code >= 97 && code <= 122) return loArr[code-97] || c;
      return c;
    }).join('');
  }

      { label: '💻 Monospace',                       text: convertMap(text, maps.monospace) },
      { label: '⭕ Burbuja',                          text: convertSimple(text, bubbleUpper, bubbleLower) },
      { label: '🅰️ Burbuja rellena',                 text: convertSimple(text, '🅐🅑🅒🅓🅔🅕🅖🅗🅘🅙🅚🅛🅜🅝🅞🅟🅠🅡🅢🅣🅤🅥🅦🅧🅨🅩', 'ⓐⓑⓒⓓⓔⓕⓖⓗⓘⓙⓚⓛⓜⓝⓞⓟⓠⓡⓢⓣⓤⓥⓦⓧⓨⓩ') },
      { label: '🈶 Ancho completo',                  text: convertSimple(text, fwUpper, fwLower) },
      { label: '✦ Decorada con estrellas',           text: `✦ ${convertMap(text, maps.scriptBold)} ✦` },
      { label: '🌸 Estilo kawaii',                   text: `꒰ ${text} ꒱` },
      { label: '👑 Estilo reina/rey',                text: `꧁👑 ${u} 👑꧂` },
      { label: '🔥 Estilo fuego',                    text: `꧁🔥 ${convertMap(text, maps.bold)} 🔥꧂` },
      { label: '🌙 Luna y estrellas',                text: `✨${convertMap(text, maps.script)}✨` },
      { label: '💫 Entre flores',                    text: `✿ ${text} ✿` },
      { label: '🎀 Lazo y corazones',                text: `🎀 ${convertMap(text, maps.scriptBold)} 🎀` },
      { label: '⚡ Energía',                         text: `⚡${convertMap(text, maps.sansBold)}⚡` },
      { label: '🖤 Minimalista oscura',              text: `· ${convertMap(text, maps.italic)} ·` },
      { label: '💜 Con corazón',                     text: `${convertMap(text, maps.scriptBold)} 💜` },
      { label: '🌺 Tropical',                        text: `🌺 ${text} 🌺` },
      { label: '📷 Para fotógrafos',                 text: `[ ${convertMap(text, maps.monospace)} ]` },
    ];
  }

  function generateFonts() {
    const raw = document.getElementById('textInput').value.trim();
    if (!raw) { showToast('Escribe tu texto primero'); return; }

    const results = bioTemplates(raw);
    const grid = document.getElementById('fontGrid');
    const label = document.getElementById('resultsLabel');
    grid.innerHTML = '';
    label.style.display = 'block';

    results.forEach(({label: lbl, text}) => {
      const card = document.createElement('div');
      card.className = 'font-card';
      card.innerHTML = `
        <div class="font-info">
          <div class="font-label">${lbl}</div>
          <div class="font-text">${text}</div>
        </div>
        <span class="copy-hint">Copiar</span>
      `;
      card.addEventListener('click', () => {
        navigator.clipboard.writeText(text).catch(()=>{});
        showToast('¡Texto copiado!');
      });
      grid.appendChild(card);
    });
  }

  document.getElementById('textInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') generateFonts();
  });

  let t;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    clearTimeout(t); t = setTimeout(()=>el.classList.remove('show'),1800);
  }

  // Theme toggle
  (function() {
    const saved = localStorage.getItem('theme') || 'dark';
    if (saved === 'light') document.body.classList.add('light');
    const btn = document.createElement('button');
    btn.className = 'theme-toggle';
    btn.title = 'Cambiar tema';
    btn.textContent = saved === 'light' ? '🌙' : '☀️';
    btn.addEventListener('click', () => {
      const isLight = document.body.classList.toggle('light');
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
      btn.textContent = isLight ? '🌙' : '☀️';
    });
    document.body.appendChild(btn);
  })();
</script>
</body>
</html>
