      lower: 'рқҳўрқҳЈрқҳӨрқҳҘрқҳҰрқҳ§рқҳЁрқҳ©рқҳӘрқҳ«рқҳ¬рқҳӯрқҳ®рқҳҜрқҳ°рқҳұрқҳІрқҳірқҳҙрқҳөрқҳ¶рқҳ·рқҳёрқҳ№рқҳәрқҳ»',
      digits:'0123456789'
    },
  };

  // Bubble / circled letters
  const bubbleUpper = 'в’¶в’·в’ёв’№в’әв’»в’јв’Ҫв’ҫв’ҝв“Җв“Ғв“Ӯв“ғв“„в“…в“Ҷв“Үв“Ҳв“үв“Ҡв“Ӣв“Ңв“Қв“Һв“Ҹ';
  const bubbleLower = 'в“җв“‘в“’в““в“”в“•в“–в“—в“ҳв“ҷв“ҡв“ӣв“ңв“қв“һв“ҹв“ в“Ўв“ўв“Јв“Өв“Ҙв“Ұв“§в“Ёв“©';

  // Fullwidth
  const fwUpper = 'пјЎпјўпјЈпјӨпјҘпјҰпј§пјЁпј©пјӘпј«пј¬пјӯпј®пјҜпј°пјұпјІпјіпјҙпјөпј¶пј·пјёпј№пјә';
  const fwLower = 'пҪҒпҪӮпҪғпҪ„пҪ…пҪҶпҪҮпҪҲпҪүпҪҠпҪӢпҪҢпҪҚпҪҺпҪҸпҪҗпҪ‘пҪ’пҪ“пҪ”пҪ•пҪ–пҪ—пҪҳпҪҷпҪҡ';

  function convertMap(text, map) {
    const upArr = [...map.upper];
    const loArr = [...map.lower];
    const dgArr = map.digits ? [...map.digits] : null;
    return [...text].map(c => {
      const u = c.toUpperCase();
      const code = u.charCodeAt(0);
      if (code >= 65 && code <= 90) {
        const idx = code - 65;
        if (c === c.toUpperCase() && c !== c.toLowerCase()) return upArr[idx] || c;
        return loArr[idx] || c;
      }
      if (dgArr && c >= '0' && c <= '9') return [...dgArr][c.charCodeAt(0)-48] || c;
      return c;
    }).join('');
  }

  function convertSimple(text, upper, lower) {
    const upArr = [...upper];
    const loArr = [...lower];
    return [...text].map(c => {
      const code = c.charCodeAt(0);
      if (code >= 65 && code <= 90) return upArr[code-65] || c;
      if (code >= 97 && code <= 122) return loArr[code-97] || c;
      return c;
    }).join('');
  }

  // Decorative bio templates
  function bioTemplates(text) {
    const u = text.toUpperCase();
    return [
      { label: 'вңЁ Cursiva elegante (рқ“ўрқ“¬рқ“»рқ“Ірқ“№рқ“Ҫ)',    text: convertMap(text, maps.scriptBold) },
      { label: 'рҹ–Ө GГіtica oscura',                   text: convertMap(text, maps.gothic) },
      { label: 'рҹ’Һ GГіtica negrita',                  text: convertMap(text, maps.gothicBold) },
      { label: 'рҹҢҹ Negrita sans',                    text: convertMap(text, maps.sansBold) },
      { label: 'рҹ“– Cursiva script',                  text: convertMap(text, maps.script) },
      { label: 'рҹ”ө Doble trazo',                     text: convertMap(text, maps.doubleStruck) },
      { label: 'в¬ӣ Negrita serif',                   text: convertMap(text, maps.bold) },
      { label: 'рҹ–ҠпёҸ ItГЎlica bold',                   text: convertMap(text, maps.boldItalic) },
      { label: 'рҹ’» Monospace',                       text: convertMap(text, maps.monospace) },
      { label: 'вӯ• Burbuja',                          text: convertSimple(text, bubbleUpper, bubbleLower) },
      { label: 'рҹ…°пёҸ Burbuja rellena',                 text: convertSimple(text, 'рҹ…җрҹ…‘рҹ…’рҹ…“рҹ…”рҹ…•рҹ…–рҹ…—рҹ…ҳрҹ…ҷрҹ…ҡрҹ…ӣрҹ…ңрҹ…қрҹ…һрҹ…ҹрҹ… рҹ…Ўрҹ…ўрҹ…Јрҹ…Өрҹ…Ҙрҹ…Ұрҹ…§рҹ…Ёрҹ…©', 'в“җв“‘в“’в““в“”в“•в“–в“—в“ҳв“ҷв“ҡв“ӣв“ңв“қв“һв“ҹв“ в“Ўв“ўв“Јв“Өв“Ҙв“Ұв“§в“Ёв“©') },
      { label: 'рҹҲ¶ Ancho completo',                  text: convertSimple(text, fwUpper, fwLower) },
      { label: 'вңҰ Decorada con estrellas',           text: `вңҰ ${convertMap(text, maps.scriptBold)} вңҰ` },
      { label: 'рҹҢё Estilo kawaii',                   text: `к’° ${text} к’ұ` },
      { label: 'рҹ‘‘ Estilo reina/rey',                text: `к§Ғрҹ‘‘ ${u} рҹ‘‘к§Ӯ` },
      { label: 'рҹ”Ҙ Estilo fuego',                    text: `к§Ғрҹ”Ҙ ${convertMap(text, maps.bold)} рҹ”Ҙк§Ӯ` },
      { label: 'рҹҢҷ Luna y estrellas',                text: `вңЁ${convertMap(text, maps.script)}вңЁ` },
      { label: 'рҹ’« Entre flores',                    text: `вңҝ ${text} вңҝ` },
      { label: 'рҹҺҖ Lazo y corazones',                text: `рҹҺҖ ${convertMap(text, maps.scriptBold)} рҹҺҖ` },
      { label: 'вҡЎ EnergГӯa',                         text: `вҡЎ${convertMap(text, maps.sansBold)}вҡЎ` },
      { label: 'рҹ–Ө Minimalista oscura',              text: `В· ${convertMap(text, maps.italic)} В·` },
      { label: 'рҹ’ң Con corazГіn',                     text: `${convertMap(text, maps.scriptBold)} рҹ’ң` },
      { label: 'рҹҢә Tropical',                        text: `рҹҢә ${text} рҹҢә` },
      { label: 'рҹ“· Para fotГіgrafos',                 text: `[ ${convertMap(text, maps.monospace)} ]` },
    ];
  }

  function generateFonts() {
    const raw = document.getElementById('textInput').value.trim();
    if (!raw) { showToast('Escribe tu texto primero'); return; }

    const results = bioTemplates(raw);
    const grid = document.getElementById('fontGrid');
    const label = document.getElementById('resultsLabel');
    grid.innerHTML = '';
    label.style.display = 'block';

    results.forEach(({label: lbl, text}) => {
      const card = document.createElement('div');
      card.className = 'font-card';
      card.innerHTML = `
        <div class="font-info">
          <div class="font-label">${lbl}</div>
          <div class="font-text">${text}</div>
        </div>
        <span class="copy-hint">Copiar</span>
      `;
      card.addEventListener('click', () => {
        navigator.clipboard.writeText(text).catch(()=>{});
        showToast('ВЎTexto copiado!');
      });
      grid.appendChild(card);
    });
  }

  document.getElementById('textInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') generateFonts();
  });

  let t;
  function showToast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    clearTimeout(t); t = setTimeout(()=>el.classList.remove('show'),1800);
  }

  // Theme toggle
  (function() {
    const saved = localStorage.getItem('theme') || 'dark';
    if (saved === 'light') document.body.classList.add('light');
    const btn = document.createElement('button');
    btn.className = 'theme-toggle';
    btn.title = 'Cambiar tema';
    btn.textContent = saved === 'light' ? 'рҹҢҷ' : 'вҳҖпёҸ';
    btn.addEventListener('click', () => {
      const isLight = document.body.classList.toggle('light');
      localStorage.setItem('theme', isLight ? 'light' : 'dark');
      btn.textContent = isLight ? 'рҹҢҷ' : 'вҳҖпёҸ';
    });
    document.body.appendChild(btn);
  })();
</script>
</body>
</html>
